# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME

font_size 11.0

window_padding_width 6 8

cursor_blink_interval 0
cursor_trail 1
cursor_trail_decay 0.1 0.2
cursor_trail_start_threshold 5

repaint_delay 2
input_delay 0

editor .


# BEGIN_KITTY_FONTS
font_family      family="MonaspiceNe Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS